<!DOCTYPE html>

<html>

<head>

    <title>Register</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body
    style="
        background:#f4f6f9;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    "
>

    <div
        class="card shadow p-4"
        style="width:400px;"
    >

        <h2 class="text-center mb-4">

            Smart ERP Register

        </h2>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
                class="form-control mb-3"
                required
            >

            <input
                type="email"
                name="email"
                placeholder="Email"
                class="form-control mb-3"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                class="form-control mb-3"
                required
            >

            <button
                type="submit"
                class="btn btn-success w-100"
            >

                Register

            </button>

        </form>

        <p class="mt-3 text-center">

            Already have account?

            <a href="/login/">

                Login

            </a>

        </p>

    </div>

</body>

</html>
