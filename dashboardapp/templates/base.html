<!DOCTYPE html>
<html>

<head>

    <title>Smart ERP</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
>

<link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f4f6f9;
        }

        .sidebar{

            width:250px;
            height:100vh;
            background:#1e293b;
            color:white;

            position:fixed;

            padding:20px;
        }

        .sidebar h2{
            text-align:center;
        }

        .sidebar ul{
            list-style:none;
            padding:0;
        }

        .sidebar ul li{

            padding:15px;
            margin-top:10px;
            background:#334155;
            border-radius:8px;
        }

        .sidebar ul li:hover{
            background:#475569;
            cursor:pointer;
        }

        .main{

            margin-left:290px;
            padding:30px;
        }

        a{
            color:white;
            text-decoration:none;
            display:block;
        }

    </style>

</head>

<body>

    <div class="sidebar">

        <h2>Smart ERP</h2>

        <ul>

            <li>
    <a href="/">

        <i class="fa-solid fa-chart-line"></i>

        Dashboard

    </a>
</li>

<li>
    <a href="/products/">

        <i class="fa-solid fa-box"></i>

        Products

    </a>
</li>

<li>
    <a href="/employees/">

        <i class="fa-solid fa-users"></i>

        Employees

    </a>
</li>

<li>
    <a href="/customers/">

        <i class="fa-solid fa-user"></i>

        Customers

    </a>
</li>

<li>
    <a href="/orders/">

        <i class="fa-solid fa-cart-shopping"></i>

        Orders

    </a>
</li>

            

        </ul>

    </div>

    <div class="main">
        <nav class="navbar navbar-light bg-white shadow-sm rounded px-4 py-3 mb-4">

        <div>

               <h4 class="mb-0">

        Smart ERP System

    </h4>

    <small>

        Welcome,
        {{ request.user.username }}

    </small>

        </div>

        <div>

            <a
    href="/logout/"
    class="btn btn-danger"
>

    Logout

</a>

        </div>

    </nav>


        {% block content %}

        {% endblock %}

    </div>



</body>

</html>
